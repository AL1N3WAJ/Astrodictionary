<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>শব্দকোষ — Astronomy Word Dictionary</title>
<style>
  :root{
    --bg-0:#0a0f24;
    --bg-1:#111a3d;
    --ink-0:#eef1f8;
    --ink-1:#8791b3;
    --gold:#f0c869;
    --line:#26305c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at top, var(--bg-1), var(--bg-0) 70%);
    color:var(--ink-0);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;
    background-attachment:fixed;
  }
  /* faint starfield, no images */
  body::before{
    content:"";
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff8 40%, transparent),
      radial-gradient(1px 1px at 80% 10%, #fff6 40%, transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, #fffa 40%, transparent),
      radial-gradient(1px 1px at 30% 85%, #fff7 40%, transparent),
      radial-gradient(1px 1px at 90% 60%, #fff5 40%, transparent),
      radial-gradient(1.5px 1.5px at 45% 40%, #fff9 40%, transparent);
    background-repeat:repeat;
    background-size:600px 600px;
  }
  .wrap{
    position:relative; z-index:1;
    max-width:720px; margin:0 auto; padding:56px 20px 80px;
  }
  header{ text-align:center; margin-bottom:36px; }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:400;
    font-size:2.4rem;
    margin:0 0 4px;
    letter-spacing:.02em;
  }
  header p{
    color:var(--ink-1);
    margin:0;
    font-size:.95rem;
  }
  .search-box{
    position:sticky; top:16px;
    display:flex; align-items:center; gap:10px;
    background:#0d1533;
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    box-shadow:0 8px 30px #0007;
  }
  .search-box svg{ flex-shrink:0; opacity:.6; }
  #q{
    flex:1; background:none; border:none; outline:none;
    color:var(--ink-0); font-size:1.05rem;
    font-family:inherit;
  }
  #q::placeholder{ color:var(--ink-1); }
  .meta{
    color:var(--ink-1); font-size:.8rem; margin:10px 2px 0;
    min-height:1.2em;
  }
  #results{ margin-top:26px; display:flex; flex-direction:column; gap:14px; }
  .card{
    background:#0d1533;
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 20px;
    animation:rise .25s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  .card .term{
    font-family:Georgia,serif;
    font-size:1.15rem;
    color:var(--gold);
    margin:0 0 2px;
  }
  .card .bn{
    font-size:1.05rem;
    margin:0 0 10px;
    color:var(--ink-0);
  }
  .card .def{
    color:#c7cce3;
    font-size:.95rem;
    line-height:1.55;
    margin:0;
    white-space:pre-line;
  }
  .card .src{
    display:inline-block; margin-top:10px;
    font-size:.72rem; color:var(--ink-1);
    border-top:1px dashed var(--line); padding-top:8px; width:100%;
  }
  .empty{
    text-align:center; color:var(--ink-1);
    padding:40px 10px; font-size:.95rem;
  }
  @media (prefers-reduced-motion: reduce){
    .card{ animation:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>জ্যোতির্বিজ্ঞান শব্দকোষ</h1>
    <p>Astronomy word dictionary — search a term in English or বাংলা</p>
  </header>

  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#eef1f8" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="q" type="text" placeholder="Type a word… e.g. Antares, নক্ষত্র" autofocus>
  </div>
  <div class="meta" id="meta"></div>

  <div id="results"></div>
</div>

<script>
const DATA_URL = "data.json";
let entries = [];
let timer = null;

fetch(DATA_URL)
  .then(r => r.json())
  .then(json => { entries = json; setMeta(`${entries.length} entries loaded`); })
  .catch(() => setMeta("Couldn't load data.json — check it's in the same folder"));

const $q = document.getElementById("q");
const $results = document.getElementById("results");
const $meta = document.getElementById("meta");

function setMeta(text){ $meta.textContent = text; }

function localSearch(query){
  const s = query.trim().toLowerCase();
  if(!s) return [];
  return entries.filter(e =>
    e.term.toLowerCase().includes(s) ||
    (e.bn && e.bn.includes(query.trim()))
  );
}

function render(list, note){
  $results.innerHTML = "";
  if(note) setMeta(note);
  if(list.length === 0){
    $results.innerHTML = `<div class="empty">No matches yet.</div>`;
    return;
  }
  for(const e of list){
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <p class="term">${escapeHTML(e.term)}</p>
      ${e.bn ? `<p class="bn">${escapeHTML(e.bn)}</p>` : ""}
      <p class="def">${escapeHTML(e.def || "")}</p>
      ${e.source ? `<span class="src">source: ${escapeHTML(e.source)}</span>` : ""}
    `;
    $results.appendChild(card);
  }
}

function escapeHTML(str){
  return String(str).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

// Fallback to a free public dictionary API for general English words
// not found in the book (e.g. https://dictionaryapi.dev)
async function fallbackLookup(word){
  try{
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if(!res.ok) return [];
    const json = await res.json();
    const meanings = json[0]?.meanings || [];
    return meanings.slice(0, 3).map(m => ({
      term: json[0].word,
      bn: "",
      def: (m.definitions[0]?.definition || ""),
      source: "dictionaryapi.dev (free dictionary, English only)"
    }));
  }catch(err){
    return [];
  }
}

$q.addEventListener("input", () => {
  clearTimeout(timer);
  const query = $q.value;
  timer = setTimeout(async () => {
    const local = localSearch(query);
    if(local.length){
      render(local, `${local.length} match(es) from the book`);
      return;
    }
    if(!query.trim()){
      render([], "");
      setMeta(`${entries.length} entries loaded`);
      return;
    }
    setMeta("Not in the book — checking a free dictionary…");
    const online = await fallbackLookup(query.trim());
    if(online.length){
      render(online, `No book entry — showing a general English definition`);
    }else{
      render([], "No match found in the book or the free dictionary");
    }
  }, 150);
});
</script>
</body>
</html>
